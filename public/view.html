<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>View Gist</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
body {
    background: #0d1117;
    color: white;
    font-family: Arial;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

pre {
    background: #161b22;
    padding: 15px;
    border-radius: 10px;
    overflow-x: auto;
}

button {
    margin-top: 10px;
    padding: 8px 12px;
    background: #238636;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
    <h2 id="title">Loading...</h2>
    <button onclick="copyCode()">Copy</button>
</div>

<pre><code id="code"></code></pre>

</div>

<script>
const id = window.location.pathname.split("/")[2];

fetch("/api/gist/" + id)
.then(res => res.json())
.then(data => {
    document.getElementById("title").innerText = data.title;
    document.getElementById("code").innerText = data.code;

    hljs.highlightAll();
});

function copyCode() {
    navigator.clipboard.writeText(
        document.getElementById("code").innerText
    );
    alert("Copied!");
}
</script>

</body>
</html>
